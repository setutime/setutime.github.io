            color: #333;
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px 15px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 25px 0;
            margin-bottom: 15px;
        }
        
        h1 {
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: -1px;
            color: #495057;
            margin-bottom: 5px;
        }

    /* QQ好友按钮容器 */
    .qq-button-container {
        display: flex;
        justify-content: center;
        margin: 0 auto 20px;
        animation: fadeIn 0.5s ease-out;
    }
    
    /* QQ好友按钮样式 */
    .qq-button {
        background: linear-gradient(135deg, #ffc0cb 0%, #ffb6c1 100%);
        color: white;
        text-decoration: none;
        padding: 14px 30px;
        border-radius: 50px;
        font-size: 1.15rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 6px 16px rgba(255, 182, 193, 0.3);
        transition: all 0.3s ease;
        border: 1px solid rgba(255, 255, 255, 0.2);
        text-align: center;
        max-width: 300px;
        width: 100%;
    }
    
    .qq-button:hover {
        transform: translateY(-3px);
        box-shadow: 0 10极 25px rgba(255, 182, 193, 0.4);
        background: linear-gradient(135deg, #ffb6c1 0%, #ffc0cb 100%);
    }
    
    .qq-button:active {
        transform: translateY(1px);
        box-shadow: 0 4px 10px rgba(255, 182, 193, 0.3);
    }
    
    .qq-button i {
        font-size: 1.4rem;
        margin-right: 10px;
    }
    
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }
        
        .file-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .file-btn {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 22px 15px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 14px;
            border: 1px solid rgba(0,0,0,0.05);
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            min-height: 120px;
        }
        
        .file-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.07);
            background: rgba(255, 255, 255, 1);
            border-color: rgba(73, 80, 87, 0.1);
        }
        
        .file-btn i {
            font-size: 30px;
            margin-bottom: 15px;
            color: #6c757d;
        }
        
        .file-btn .btn-title {
            font-weight: 500;
            font-size: 1.05rem;
            color: #495057;
        }
        
        input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        
        #display {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 25px;
            min-height: 300px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.8);
        }
        
        .image-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        
        .result-image {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            background: #f8f9fa;
            border: 1px solid rgba(0,0,0,0.03);
            transition: transform 0.3s ease;
        }
        
        .result-image:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
        }
        
        .result-image img {
            display: block;
            width: 100%;
            height: auto;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #adb5bd;
        }
        
        .empty-state i {
            font-size: 52px;
            margin-bottom: 20px;
            color: #e9ecef;
        }
        
        .empty-state p {
            font-size: 1.1rem;
            max-width: 400px;
            margin: 0 auto;
        }
        
        footer {
            text-align: center;
            padding: 40px 0 20px;
            color: #6c757d;
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            .file-actions {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .file-btn {
                padding: 18px 12px;
                min-height: 110px;
            }
            
            .qq-button {
                padding: 12px 20px;
                font-size: 1.05rem;
            }
        }
        
        @media (max-width: 480px) {
            h1 {
                font-size: 1.6rem;
            }
            
            .qq-button {
                padding: 10px 15px;
                font-size: 1rem;
            }
        }
